<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR. RAVI KUMAR PRAJAPAT - BOT</title>
    <style>
        body { background-color: #fce4ec; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { color: #d4af37; font-size: 30px; font-weight: bold; text-shadow: 2px 2px #000; margin-bottom: 20px; }
        .container { background: #fff; border: 3px solid #e91e63; border-radius: 20px; padding: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .stats-box { display: flex; justify-content: space-around; background: #e91e63; color: white; padding: 10px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; color: #e91e63; margin-bottom: 5px; }
        input, textarea { width: 95%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; }
        button { background: #e91e63; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #ad1457; }
        #logs { background: #000; color: #00ff00; text-align: left; padding: 15px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">MR. RAVI KUMAR PRAJAPAT</div>
    <div class="container">
        <div class="stats-box">
            <div>Active: <span id="active-val">0</span></div>
            <div>Sent: <span id="sent-val">0</span></div>
        </div>

        <div class="input-group">
            <label>🆔 CONVO/GROUP ID</label>
            <input type="text" id="targetId" placeholder="Enter ID here...">
        </div>

        <div class="input-group">
            <label>👤 HATER NAME</label>
            <input type="text" id="haterName" placeholder="Enter name...">
        </div>

        <div class="input-group">
            <label>📝 MESSAGES (ONE PER LINE)</label>
            <textarea id="messages" rows="4" placeholder="Enter your messages..."></textarea>
        </div>

        <div class="input-group">
            <label>🍪 COOKIES (ONE PER LINE)</label>
            <textarea id="cookies" rows="4" placeholder="Paste your cookies..."></textarea>
        </div>

        <div class="input-group">
            <label>⚡ SPEED (SECONDS)</label>
            <input type="number" id="delay" value="60">
        </div>

        <button onclick="startBot()">🚀 START SERVER</button>
        <div id="logs">Waiting for server...</div>
    </div>

    <script>
        function startBot() {
            const data = {
                targetId: document.getElementById('targetId').value,
                haterName: document.getElementById('haterName').value,
                messageFile: document.getElementById('messages').value,
                cookies: document.getElementById('cookies').value,
                delay: document.getElementById('delay').value
            };

            fetch('/api/messages/multi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert("Bot Started Successfully!");
                document.getElementById('logs').innerHTML += "<div>[System] Bot session initiated...</div>";
            });
        }

        setInterval(() => {
            fetch('/api/stats').then(res => res.json()).then(data => {
                document.getElementById('active-val').innerText = data.activeSessions;
                document.getElementById('sent-val').innerText = data.totalMessages;
            });
        }, 3000);
    </script>
</body>
</html>
